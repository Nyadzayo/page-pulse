<!DOCTYPE html>
<html>
<head><title>Sound Test</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:40px;">
<h2>PagePulse Sound Test</h2>
<button id="play" style="padding:16px 32px;font-size:18px;cursor:pointer;background:#10B981;color:#000;border:none;border-radius:8px;">Play Chime</button>
<p id="status" style="margin-top:16px;color:#9CA3AF;"></p>
<script>
const SAMPLE_RATE = 22050;

function generateChime() {
  const duration = 0.3;
  const samples = Math.floor(SAMPLE_RATE * duration);
  const buffer = new Float32Array(samples);

  for (let i = 0; i < samples; i++) {
    const t = i / SAMPLE_RATE;
    const half = duration / 2;
    let freq, vol;
    if (t < half) {
      freq = 523.25;
      vol = 1 - (t / half) * 0.3;
    } else {
      freq = 659.25;
      const t2 = t - half;
      vol = (1 - t2 / half);
    }
    const attack = Math.min(1, t * 50);
    const release = Math.min(1, (duration - t) * 20);
    const envelope = attack * release * vol * 0.4;
    buffer[i] = Math.sin(2 * Math.PI * freq * t) * envelope;
  }
  return buffer;
}

function encodeWav(samples) {
  const numSamples = samples.length;
  const dataSize = numSamples * 2;
  const buffer = new ArrayBuffer(44 + dataSize);
  const view = new DataView(buffer);

  function ws(offset, str) { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); }

  ws(0, 'RIFF');
  view.setUint32(4, 36 + dataSize, true);
  ws(8, 'WAVE');
  ws(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, SAMPLE_RATE, true);
  view.setUint32(28, SAMPLE_RATE * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  ws(36, 'data');
  view.setUint32(40, dataSize, true);

  for (let i = 0; i < numSamples; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  return buffer;
}

// Method 1: Data URL
function playViaDataUrl() {
  const samples = generateChime();
  const wav = encodeWav(samples);
  const bytes = new Uint8Array(wav);
  let binary = '';
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  const dataUrl = 'data:audio/wav;base64,' + btoa(binary);
  const audio = new Audio(dataUrl);
  audio.volume = 0.5;
  return audio.play();
}

// Method 2: Web Audio API (more reliable)
function playViaWebAudio() {
  const ctx = new AudioContext();
  const samples = generateChime();
  const audioBuffer = ctx.createBuffer(1, samples.length, SAMPLE_RATE);
  audioBuffer.getChannelData(0).set(samples);
  const source = ctx.createBufferSource();
  source.buffer = audioBuffer;
  const gain = ctx.createGain();
  gain.gain.value = 0.5;
  source.connect(gain);
  gain.connect(ctx.destination);
  source.start();
  return Promise.resolve();
}

document.getElementById('play').addEventListener('click', async () => {
  const status = document.getElementById('status');

  // Try Web Audio first
  try {
    await playViaWebAudio();
    status.textContent = 'Web Audio API: played successfully';
    status.style.color = '#10B981';
    return;
  } catch(e) {
    status.textContent = 'Web Audio failed: ' + e.message + '. Trying Data URL...';
  }

  // Fallback to Data URL
  try {
    await playViaDataUrl();
    status.textContent = 'Data URL Audio: played successfully';
    status.style.color = '#10B981';
  } catch(e) {
    status.textContent = 'Both methods failed: ' + e.message;
    status.style.color = '#EF4444';
  }
});
</script>
</body>
</html>
